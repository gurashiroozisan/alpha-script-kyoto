<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works | Alpha Script</title>
  <meta name="description" content="LP・HP・業務改善ツールの制作デモ一覧">
  <link rel="icon" href="/alpha-script-kyoto/assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/alpha-script-kyoto/css/style.css">
</head>
<body>
  <a href="#main" class="skip-link">メインコンテンツへスキップ</a>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/alpha-script-kyoto/" class="logo" aria-label="Alpha Script ホーム"><img src="/alpha-script-kyoto/assets/logo.png" alt="Alpha Script" class="logo-img" width="140" height="48"></a>
      <button class="nav-toggle" aria-label="メニューを開く" aria-expanded="false" aria-controls="main-nav"><span></span><span></span><span></span></button>
      <nav id="main-nav" class="main-nav" aria-label="メインナビゲーション">
        <ul>
          <li><a href="/alpha-script-kyoto/">Home</a></li>
          <li><a href="/alpha-script-kyoto/about/">About</a></li>
          <li><a href="/alpha-script-kyoto/services/">Services</a></li>
          <li><a href="/alpha-script-kyoto/works/" aria-current="page">Works</a></li>
          <li><a href="/alpha-script-kyoto/contact/" class="nav-cta">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="page-hero">
      <div class="container">
        <p class="section-eyebrow">Works</p>
        <h1>制作デモ・ポートフォリオ</h1>
        <p class="page-lead">ポートフォリオHubの実デモへ直接アクセスできます。</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="portfolio-banner">
          <div>
            <h2 style="color:#fff;margin-bottom:0.5rem;">全デモはポートフォリオHubで公開中</h2>
            <p>リンク先は Vercel に統一済み。404問題を解消しました。</p>
          </div>
          <a href="https://demo-portfolio-six-mu.vercel.app/#works" class="btn btn-primary" target="_blank" rel="noopener noreferrer">ポートフォリオHubを開く →</a>
        </div>

        <div class="portfolio-stats">
          <div class="portfolio-stat"><strong id="statTotal">37</strong><span>全デモ</span></div>
          <div class="portfolio-stat"><strong id="statTool">22</strong><span>業務ツール</span></div>
          <div class="portfolio-stat"><strong id="statLp">12</strong><span>LP</span></div>
          <div class="portfolio-stat"><strong id="statHp">3</strong><span>HP・メディア</span></div>
        </div>

        <div class="portfolio-toolbar">
          <div class="portfolio-filters">
            <button class="portfolio-filter is-active" data-portfolio-filter="all" type="button">注目デモ</button>
            <button class="portfolio-filter" data-portfolio-filter="tool" type="button">業務ツール</button>
            <button class="portfolio-filter" data-portfolio-filter="lp" type="button">LP</button>
            <button class="portfolio-filter" data-portfolio-filter="hp" type="button">HP</button>
          </div>
          <p class="portfolio-count" id="portfolioCount">10 件を表示（全37件）</p>
        </div>

        <div class="portfolio-grid" id="portfolioGrid"></div>
      </div>
    </section>
  </main>

  <script src="/alpha-script-kyoto/js/main.js"></script>
  <script src="/alpha-script-kyoto/js/portfolio.js"></script>
</body>
</html>
